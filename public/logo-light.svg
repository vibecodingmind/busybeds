<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" fill="none">
  <!-- Icon: house + checkmark badge -->
  <!-- Roof left -->
  <path d="M 11 42 L 40 11" stroke="#E8395A" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Roof right -->
  <path d="M 69 42 L 46 18" stroke="#E8395A" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left wall -->
  <path d="M 14 40 L 14 67 Q 14 72 20 72 L 33 72" stroke="#E8395A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right wall -->
  <path d="M 66 40 L 66 67 Q 66 72 60 72 L 50 72" stroke="#E8395A" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Badge circle -->
  <circle cx="53" cy="59" r="16" fill="black"/>
  <circle cx="53" cy="59" r="14" stroke="#E8395A" stroke-width="4.5"/>
  <!-- Checkmark -->
  <polyline points="45,59 51,65 62,50" stroke="#E8395A" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "busy" in coral -->
  <text x="86" y="58"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="38"
        fill="#E8395A"
        letter-spacing="-1">busy</text>

  <!-- "beds" in white -->
  <text x="192" y="58"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="38"
        fill="#FFFFFF"
        letter-spacing="-1">beds</text>
</svg>
