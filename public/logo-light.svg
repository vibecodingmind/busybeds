<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">

  <!-- ═══ BED ICON ═══ -->

  <!-- Headboard -->
  <rect x="6" y="14" width="11" height="46" rx="5.5" fill="#E8395A"/>

  <!-- Bed frame / base -->
  <rect x="6" y="46" width="58" height="12" rx="6" fill="#E8395A"/>

  <!-- Pillow left -->
  <rect x="21" y="27" width="17" height="15" rx="5" fill="#E8395A"/>

  <!-- Pillow right -->
  <rect x="42" y="27" width="17" height="15" rx="5" fill="#E8395A"/>

  <!-- Tick badge: transparent bg disc + coral fill + white checkmark -->
  <circle cx="57" cy="54" r="15" fill="rgba(0,0,0,0.25)"/>
  <circle cx="57" cy="54" r="13" fill="#E8395A"/>
  <polyline points="50,54 55.5,60 65,46" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ═══ WORDMARK ═══ -->
  <!-- "busy" coral -->
  <text x="80" y="51"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="800"
        font-size="34"
        fill="#E8395A"
        letter-spacing="-1">busy</text>

  <!-- "beds" white (for dark backgrounds) -->
  <text x="172" y="51"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="800"
        font-size="34"
        fill="#FFFFFF"
        letter-spacing="-1">beds</text>

</svg>
